<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INCroute CMS</title>
    <link rel="icon" type="image/png" href="/incroute_logo.png" />
    <style>
      /* ─── Clean Light Theme for Decap CMS ─── */
      
      html, body {
        background: #F8F9FC !important;
        color: #1a1a2e !important;
        font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
      }

      /* Force light background globally */
      #nc-root,
      #nc-root > div,
      #nc-root > div > div {
        background: #F8F9FC !important;
        color: #1a1a2e !important;
      }

      /* Top navigation bar — dark header for contrast */
      [class*="AppHeader"],
      header[class] {
        background: #1B1828 !important;
        border-bottom: 1px solid rgba(108, 124, 255, 0.15) !important;
      }
      [class*="AppHeader"] a,
      [class*="AppHeader"] span,
      [class*="AppHeader"] button,
      header a, header span, header button {
        color: #F2EFFB !important;
      }
      [class*="AppHeader"] a:hover,
      [class*="AppHeader"] button:hover {
        color: #6C7CFF !important;
      }

      /* Main content area */
      main, [role="main"],
      [class*="Main"],
      [class*="EntryListing"],
      [class*="CollectionTop"],
      [class*="CollectionMain"],
      [class*="ViewContainer"] {
        background: #F8F9FC !important;
        color: #1a1a2e !important;
      }

      /* Sidebar */
      aside, [class*="Sidebar"], [class*="CollectionPane"] {
        background: #FFFFFF !important;
        border-right: 1px solid #E5E7EB !important;
      }

      /* Headings */
      h1, h2, h3, h4, h5, h6 {
        color: #1a1a2e !important;
      }

      /* Cards */
      [class*="ListCard"],
      [class*="Card"],
      [class*="EntryCard"] {
        background: #FFFFFF !important;
        border: 1px solid #E5E7EB !important;
        border-radius: 10px !important;
        color: #1a1a2e !important;
      }
      [class*="ListCard"]:hover,
      [class*="Card"]:hover {
        border-color: #6C7CFF !important;
        box-shadow: 0 4px 12px rgba(91, 108, 255, 0.08) !important;
      }

      /* Inputs */
      input, textarea, select {
        background: #FFFFFF !important;
        border: 1px solid #E5E7EB !important;
        color: #1a1a2e !important;
        border-radius: 8px !important;
      }
      input:focus, textarea:focus, select:focus {
        border-color: #6C7CFF !important;
        box-shadow: 0 0 0 3px rgba(108, 124, 255, 0.10) !important;
        outline: none !important;
      }

      /* Labels */
      label {
        color: #4B5563 !important;
      }

      /* Editor area */
      [class*="Editor"],
      [class*="ControlPane"],
      [class*="ControlPaneContainer"] {
        background: #F8F9FC !important;
        color: #1a1a2e !important;
      }

      /* Toolbar */
      [class*="Toolbar"], [class*="toolbar"] {
        background: #FFFFFF !important;
        border: 1px solid #E5E7EB !important;
        border-radius: 8px !important;
      }

      /* Modals */
      [class*="Modal"], [class*="Dialog"], [role="dialog"] {
        background: #FFFFFF !important;
        border-radius: 16px !important;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15) !important;
        color: #1a1a2e !important;
      }

      /* Dropdowns */
      [class*="Dropdown"], [role="listbox"], [role="menu"] {
        background: #FFFFFF !important;
        border: 1px solid #E5E7EB !important;
        border-radius: 8px !important;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10) !important;
      }
    </style>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init();
    </script>
  </body>
</html>
