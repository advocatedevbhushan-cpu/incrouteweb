<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Incroute Admin CMS</title>
    <link rel="icon" type="image/png" href="/incroute_logo.png" />
    <!-- Netlify Identity Widget for Authentication -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* Style customization to align Decap CMS aesthetics with Incroute branding */
      #nc-root {
        font-family: ui-sans-serif, system-ui, sans-serif !important;
      }
      #nc-root header {
        background-color: #000000 !important;
        border-bottom: 1px solid rgba(212, 175, 55, 0.2) !important;
      }
      #nc-root header a, #nc-root header button {
        color: #ffffff !important;
      }
      #nc-root header a:hover, #nc-root header button:hover {
        color: #d4af37 !important;
      }
    </style>
  </head>
  <body>
    <!-- Enable manual initialization to ensure custom formats are registered before CMS starts -->
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <!-- Decap CMS main library script -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Register custom format for parsing and saving flat JSON arrays
      CMS.registerFormat('json-array', {
        label: 'JSON Array',
        toFile: function(obj) {
          // Serialize the posts list back into a clean flat array
          var posts = obj.posts || [];
          return JSON.stringify(posts, null, 2);
        },
        fromFile: function(content) {
          // Read the flat JSON array and wrap it into a 'posts' property for the list widget
          try {
            var posts = JSON.parse(content);
            return { posts: Array.isArray(posts) ? posts : [] };
          } catch (e) {
            console.error("[CMS] Failed to parse JSON database array:", e);
            return { posts: [] };
          }
        }
      });
      
      // Initialize the CMS manually after registering custom formats
      CMS.init();
    </script>
  </body>
</html>
