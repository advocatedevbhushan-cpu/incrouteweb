<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Securing Administrative Session...</title>
    <link rel="icon" type="image/png" href="/incroute_logo.png" />
    <style>
      body {
        background-color: #030303;
        color: #ffffff;
        font-family: ui-sans-serif, system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      .container {
        text-align: center;
        max-width: 450px;
        padding: 40px;
        border-radius: 24px;
        background: radial-gradient(circle at top, rgba(212, 175, 55, 0.08) 0%, rgba(0, 0, 0, 0) 70%), #0d0d0d;
        border: 1px solid rgba(212, 175, 55, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 2px solid #d4af37;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        margin-bottom: 24px;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin: 0 0 10px 0;
        color: #f3f3f3;
      }
      p {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        margin: 0 0 30px 0;
        line-height: 1.6;
      }
      .scanner-container {
        position: relative;
        width: 140px;
        height: 140px;
        margin: 0 auto 30px auto;
        border-radius: 50%;
        border: 2px dashed rgba(212, 175, 55, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .scanner-pulse {
        position: absolute;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 2px solid #d4af37;
        opacity: 0.8;
        animation: pulse-ring 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
      }
      .scanner-icon {
        color: #d4af37;
        font-size: 36px;
        z-index: 10;
        animation: breath 2s ease-in-out infinite;
      }
      @keyframes pulse-ring {
        0% {
          transform: scale(0.65);
          opacity: 1;
        }
        80%, 100% {
          transform: scale(1.1);
          opacity: 0;
        }
      }
      @keyframes breath {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
      }
      .status {
        font-family: monospace;
        font-size: 11px;
        color: #d4af37;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/incroute_logo.png" class="logo" alt="Incroute Logo" />
      <div class="scanner-container">
        <div class="scanner-pulse"></div>
        <!-- Simple lock SVG icon -->
        <svg class="scanner-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1>Hardware Lock Active</h1>
      <p>Verifying secure client-side cryptographic credentials bound to this physical machine...</p>
      <div class="status" id="status-text">INITIALIZING DECRYPTOR...</div>
    </div>

    <script>
      const statusText = document.getElementById("status-text");

      function updateStatus(msg) {
        statusText.innerText = msg;
        console.log("[Device Verification] " + msg);
      }

      function handleUnauthorized() {
        updateStatus("ACCESS DENIED. REDIRECTING...");
        setTimeout(() => {
          window.location.href = "/not-found";
        }, 1200);
      }

      // IndexedDB wrapper to get the non-exportable private key
      function getDevicePrivateKey() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open("IncrouteDeviceLock", 1);
          
          request.onerror = (e) => reject("DB Open Failed");
          request.onsuccess = (e) => {
            const db = e.target.result;
            try {
              const transaction = db.transaction(["keys"], "readonly");
              const store = transaction.objectStore("keys");
              const getReq = store.get("private_key");
              
              getReq.onsuccess = (ev) => {
                if (getReq.result && getReq.result.key) {
                  resolve(getReq.result.key);
                } else {
                  reject("Key not found");
                }
              };
              getReq.onerror = () => reject("Fetch Failed");
            } catch (err) {
              reject(err);
            }
          };
          
          request.onupgradeneeded = (e) => {
            const db = e.target.result;
            db.createObjectStore("keys", { keyPath: "id" });
          };
        });
      }

      async function verifyDevice() {
        try {
          updateStatus("SCANNING LOCAL STORAGE...");
          const privateKey = await getDevicePrivateKey();
          
          updateStatus("REQUESTING CHALLENGE...");
          const challengeRes = await fetch("/api/admin/challenge");
          if (!challengeRes.ok) {
            throw new Error("Challenge request failed");
          }
          const challengeData = await challengeRes.json();
          const { challenge, timestamp } = challengeData;
          
          updateStatus("SIGNING CHALLENGE...");
          const encoder = new TextEncoder();
          const challengeBytes = encoder.encode(challenge + ":" + timestamp);
          
          const signature = await window.crypto.subtle.sign(
            {
              name: "RSASSA-PKCS1-v1_5",
            },
            privateKey,
            challengeBytes
          );
          
          // Convert ArrayBuffer to Base64
          const signatureBase64 = btoa(String.fromCharCode.apply(null, new Uint8Array(signature)));
          
          updateStatus("VERIFYING HANDSHAKE...");
          const verifyRes = await fetch("/api/admin/verify-device", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              signature: signatureBase64,
              challenge,
              timestamp
            })
          });
          
          const verifyData = await verifyRes.json();
          if (verifyRes.ok && verifyData.success) {
            updateStatus("ACCESS APPROVED. OPENING GATE...");
            setTimeout(() => {
              window.location.reload();
            }, 600);
          } else {
            throw new Error(verifyData.error || "Verification failed");
          }
        } catch (err) {
          console.error("[Device Verification Error]", err);
          handleUnauthorized();
        }
      }

      // Start the process
      verifyDevice();
    </script>
  </body>
</html>
