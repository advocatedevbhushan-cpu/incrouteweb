<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INCroute — CMS Access</title>
    <link rel="icon" type="image/png" href="/incroute_logo.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #15131F;
        color: #F2EFFB;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }
      /* Ambient glow */
      body::before {
        content: '';
        position: fixed;
        top: -20%;
        left: -10%;
        width: 60%;
        height: 60%;
        background: radial-gradient(circle, rgba(91, 108, 255, 0.08) 0%, transparent 70%);
        pointer-events: none;
      }
      body::after {
        content: '';
        position: fixed;
        bottom: -20%;
        right: -10%;
        width: 50%;
        height: 50%;
        background: radial-gradient(circle, rgba(124, 92, 246, 0.06) 0%, transparent 70%);
        pointer-events: none;
      }
      .container {
        text-align: center;
        max-width: 400px;
        width: 90%;
        padding: 48px 36px;
        border-radius: 24px;
        background: linear-gradient(145deg, rgba(27, 24, 40, 0.95), rgba(21, 19, 31, 0.98));
        border: 1px solid rgba(108, 124, 255, 0.12);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(108, 124, 255, 0.05) inset;
        position: relative;
        z-index: 1;
      }
      .logo {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 2px solid rgba(108, 124, 255, 0.3);
        box-shadow: 0 0 24px rgba(91, 108, 255, 0.15);
        margin: 0 auto 20px;
        display: block;
      }
      .brand {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 4px;
      }
      .brand span { color: #6C7CFF; font-style: italic; font-weight: 600; }
      .subtitle {
        font-size: 12px;
        color: #6B7094;
        margin-bottom: 32px;
        letter-spacing: 0.02em;
      }
      .input-group {
        position: relative;
        margin-bottom: 16px;
      }
      .input-group input {
        width: 100%;
        padding: 14px 16px;
        background: #241F38;
        border: 1px solid rgba(108, 124, 255, 0.15);
        border-radius: 12px;
        color: #F2EFFB;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .input-group input:focus {
        border-color: #6C7CFF;
        box-shadow: 0 0 0 3px rgba(108, 124, 255, 0.12);
      }
      .input-group input::placeholder {
        color: #5A5E78;
      }
      .submit-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #5B6CFF 0%, #7C5CF6 100%);
        border: none;
        border-radius: 12px;
        color: #FFFFFF;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 6px 20px rgba(91, 108, 255, 0.25);
        letter-spacing: 0.02em;
      }
      .submit-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 28px rgba(91, 108, 255, 0.35);
      }
      .submit-btn:active {
        transform: translateY(0);
      }
      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .error-msg {
        color: #EF4444;
        font-size: 12px;
        margin-top: 12px;
        display: none;
        animation: shake 0.3s ease;
      }
      .error-msg.show { display: block; }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }
      .footer-text {
        margin-top: 24px;
        font-size: 10px;
        color: #5A5E78;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/incroute_logo.png" class="logo" alt="INCroute" />
      <p class="brand">INC<span>route</span> CMS</p>
      <p class="subtitle">Content Management System — Authorized Access Only</p>
      
      <form id="gate-form">
        <div class="input-group">
          <input type="password" id="password" placeholder="Enter admin password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Access CMS</button>
        <p class="error-msg" id="error-msg">Invalid password. Please try again.</p>
      </form>
      
      <p class="footer-text">Protected by INCroute Security</p>
    </div>

    <script>
      const form = document.getElementById('gate-form');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.classList.remove('show');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Verifying...';

        try {
          const res = await fetch('/api/cms/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: passwordInput.value })
          });

          const data = await res.json();
          
          if (res.ok && data.success) {
            submitBtn.textContent = 'Access Granted ✓';
            submitBtn.style.background = 'linear-gradient(135deg, #10B981, #059669)';
            setTimeout(() => {
              window.location.reload();
            }, 500);
          } else {
            errorMsg.classList.add('show');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Access CMS';
            passwordInput.value = '';
            passwordInput.focus();
          }
        } catch (err) {
          errorMsg.textContent = 'Connection error. Please try again.';
          errorMsg.classList.add('show');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Access CMS';
        }
      });

      // Auto-focus password field
      passwordInput.focus();
    </script>
  </body>
</html>
