<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    if (window.location.hostname.startsWith("books.")) {
      window.location.href = "/dashboard";
    } else if (window.location.hostname.includes("incroute.com")) {
      window.location.href = "https://books.incroute.com/dashboard";
    } else {
      window.location.href = "/books";
    }
  </script>
  <title>Opening INCroute Books...</title>
</head>
<body style="font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0c1830; color: white;">

</body>
</html>
