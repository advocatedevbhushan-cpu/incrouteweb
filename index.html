  <script>
    (function(){
      try {
        var key = 'theme-preference';
        var html = document.documentElement;
        var saved = localStorage.getItem(key);
        var theme;
        if (saved === 'light' || saved === 'dark') {
          theme = saved;
        } else {
          theme = 'light';
        }
        html.setAttribute('data-theme', theme);
      } catch(e) {}
    })();
  </script>
